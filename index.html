<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night VR Road - A-Frame</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script>
        AFRAME.registerComponent('click-to-walk', {
            schema: { speed: { type: 'number', default: 0.12 } },
            init: function () {
                this.isWalking = false;
                this.isKidnapped = false;
                this.walkingStarted = false;
                this.walkingTime = 0;
                this.rig = this.el;
                this.camera = document.querySelector('[camera]');
                
                const startWalking = () => {
                    if (!this.isKidnapped) {
                        this.isWalking = !this.isWalking;
                        if (this.isWalking) this.walkingStarted = true;
                    }
                };

                window.addEventListener('mousedown', (e) => { if (e.button === 0) startWalking(); });
                window.addEventListener('touchstart', () => { startWalking(); });
            },
            tick: function (time, timeDelta) {
                if (this.isKidnapped) return;

                if (this.isWalking) {
                    this.walkingTime += timeDelta / 1000;
                    var direction = new THREE.Vector3();
                    this.camera.object3D.getWorldDirection(direction);
                    direction.y = 0; 
                    direction.normalize();
                    var pos = this.rig.getAttribute('position');
                    pos.x -= direction.x * this.data.speed;
                    pos.z -= direction.z * this.data.speed;
                    this.rig.setAttribute('position', pos);
                }
            }
        });

        AFRAME.registerComponent('kidnap-scene', {
            init: function () {
                this.timerEl = document.getElementById('timer-val');
                this.van = document.getElementById('kidnap-van');
                this.rig = document.getElementById('rig');
                this.overlay = document.querySelector('.ui-overlay');
                this.blackout = document.getElementById('blackout');
                this.phase = 'WAITING'; // WAITING, ARRIVING, KIDNAPPING, ESCAPING
            },
            tick: function (time, timeDelta) {
                const walkingComp = this.rig.components['click-to-walk'];
                if (!walkingComp || !walkingComp.walkingStarted) return;

                const walkTime = walkingComp.walkingTime;
                if (this.timerEl) this.timerEl.innerText = Math.floor(walkTime);

                if (this.phase === 'WAITING' && walkTime >= 15) {
                    this.phase = 'DECISION';
                    this.showDecisionUI();
                }

                if (this.phase === 'DEAD') {
                    // Force the red screen to stay visible
                    const deadScreen = document.getElementById('dead-overlay');
                    if (deadScreen) deadScreen.style.display = 'flex';
                }

                if (this.phase === 'BLACKOUT') {
                    // Fade to black
                    if (this.blackout) {
                        const opacity = parseFloat(this.blackout.getAttribute('material').opacity) || 0;
                        if (opacity < 1) {
                            this.blackout.setAttribute('material', 'opacity', opacity + 0.05);
                        } else {
                            // CUT DIRECTLY TO HOUSE
                            this.phase = 'HOUSE';
                            this.setupHouseScene();
                        }
                    }
                }

                if (this.phase === 'HOUSE') {
                    // Slight head bob for breathing
                    const bob = Math.sin(time / 1000) * 0.02;
                    this.rig.setAttribute('position', `0 ${1.2 + bob} 0`);
                    
                    const kidnapperHouse = document.getElementById('kidnapper-house');
                    if (kidnapperHouse) kidnapperHouse.setAttribute('visible', 'true');
                }
            },
            showDecisionUI: function() {
                document.getElementById('kidnap-text').innerText = "It feels like danger here...";
                document.getElementById('choice-menu-html').style.display = 'flex';
                // Stop the player from walking further
                const walkingComp = this.rig.components['click-to-walk'];
                if (walkingComp) walkingComp.isWalking = false;
            },
            handleDecision: function(choice) {
                if (choice === 3) {
                    // Correct Choice
                    document.getElementById('choice-menu-html').style.display = 'none';
                    document.getElementById('kidnap-text').innerText = "Armed and ready.";
                    // Wait 2 seconds then proceed to house
                    setTimeout(() => {
                        this.phase = 'BLACKOUT';
                    }, 2000);
                } else {
                    // Dead
                    this.phase = 'DEAD';
                    const explanation = choice === 1 ? 
                        "Running made you an easy target in the dark. You were caught from behind." : 
                        "Walking normally ignored the threat. You were ambushed without a chance to defend.";
                    
                    document.getElementById('death-explanation').innerText = explanation;
                    document.getElementById('dead-overlay').style.display = 'flex';
                    document.getElementById('choice-menu-html').style.display = 'none';
                }
            },
            setupHouseScene: function() {
                // Hide forest world
                document.getElementById('road').setAttribute('visible', 'false');
                document.getElementById('ground').setAttribute('visible', 'false');
                const forestGen = document.querySelector('[forest-generator]');
                if (forestGen) forestGen.setAttribute('visible', 'false');
                
                // Show house
                const house = document.getElementById('house-scene');
                house.setAttribute('visible', 'true');
                
                // Position player in chair
                const walkingComp = this.rig.components['click-to-walk'];
                if (walkingComp) walkingComp.isKidnapped = true;
                this.rig.setAttribute('position', '0 1.2 0');
                this.rig.setAttribute('rotation', '0 0 0');
                
                // Fade in house
                this.blackout.setAttribute('animation__fadehouse', 'property: material.opacity; from: 1; to: 0.3; dur: 3000');
                document.getElementById('kidnap-text').innerText = "Trapped, but armed.";
                document.querySelector('.ui-overlay').style.background = "rgba(0, 0, 0, 0.8)";
            }
        });

        // Global decision handler
        window.makeChoice = function(choice) {
            const scene = document.querySelector('a-scene');
            if (scene && scene.components['kidnap-scene']) {
                scene.components['kidnap-scene'].handleDecision(choice);
            }
        };

        AFRAME.registerComponent('light-flicker', {
            init: function () {
                this.light = this.el.querySelector('a-light');
                this.bulb = this.el.querySelector('a-sphere');
                this.rig = document.getElementById('rig');
                this.initialIntensity = 0.6;
                this.initialEmissive = 2;
                this.flickerTime = 0;
            },
            tick: function (time, timeDelta) {
                const kidnapScene = document.querySelector('a-scene').components['kidnap-scene'];
                const isKidnapping = kidnapScene && kidnapScene.phase !== 'WAITING';
                
                this.flickerTime += timeDelta;
                if (this.flickerTime > (isKidnapping ? 40 : 100)) {
                    this.flickerTime = 0;
                    const flickerProb = isKidnapping ? 0.4 : 0.85;
                    if (Math.random() > flickerProb) {
                        const flickerVal = isKidnapping ? (Math.random() * 0.1) : (Math.random() * 0.4);
                        if (this.light) this.light.setAttribute('intensity', flickerVal);
                        if (this.bulb) this.bulb.setAttribute('material', 'emissiveIntensity', flickerVal * 2);
                    } else {
                        if (this.light) this.light.setAttribute('intensity', this.initialIntensity);
                        if (this.bulb) this.bulb.setAttribute('material', 'emissiveIntensity', this.initialEmissive);
                    }
                }
            }
        });

        AFRAME.registerComponent('forest-generator', {
            init: function () {
                const scene = this.el;
                const roadWidth = 8;
                const numTrees = 400;
                
                for (let i = 0; i < numTrees; i++) {
                    const tree = document.createElement('a-entity');
                    const side = Math.random() > 0.5 ? 1 : -1;
                    const x = (Math.random() * 80 + roadWidth / 2 + 4) * side;
                    const z = Math.random() * -1500 + 200;
                    tree.setAttribute('position', {x: x, y: 0, z: z});
                    const trunk = document.createElement('a-cylinder');
                    trunk.setAttribute('color', '#2d1b0d');
                    trunk.setAttribute('radius', 0.2 + Math.random() * 0.2);
                    trunk.setAttribute('height', 2 + Math.random() * 2);
                    tree.appendChild(trunk);
                    const leaves = document.createElement('a-cone');
                    leaves.setAttribute('color', '#0e2b0e');
                    leaves.setAttribute('radius-bottom', 1.5 + Math.random() * 1.5);
                    leaves.setAttribute('radius-top', 0);
                    leaves.setAttribute('height', 4 + Math.random() * 3);
                    leaves.setAttribute('position', {x: 0, y: 3.5, z: 0});
                    tree.appendChild(leaves);
                    scene.appendChild(tree);
                }

                for (let i = 0; i < 40; i++) {
                    const zPos = i * -50 + 200;
                    const lightSide = i % 2 === 0 ? 1 : -1;
                    const lamp = document.createElement('a-entity');
                    lamp.setAttribute('position', `${5 * lightSide} 0 ${zPos}`);
                    lamp.setAttribute('light-flicker', ''); // Add flicker effect
                    
                    const post = document.createElement('a-cylinder');
                    post.setAttribute('color', '#111');
                    post.setAttribute('radius', 0.1);
                    post.setAttribute('height', 6);
                    lamp.appendChild(post);

                    const bulb = document.createElement('a-sphere');
                    bulb.setAttribute('color', '#FFFACD');
                    bulb.setAttribute('radius', 0.3);
                    bulb.setAttribute('position', '0 6 0');
                    bulb.setAttribute('material', 'emissive: #FFFACD; emissiveIntensity: 2');
                    lamp.appendChild(bulb);

                    // OPTIMIZATION: Remove shadow casting from 40 point lights
                    const pLight = document.createElement('a-light');
                    pLight.setAttribute('type', 'point');
                    pLight.setAttribute('intensity', 0.6);
                    pLight.setAttribute('distance', 12);
                    pLight.setAttribute('color', '#FFD700');
                    pLight.setAttribute('position', '0 5.5 0');
                    pLight.setAttribute('castShadow', 'false'); // Set to false to reduce lag
                    lamp.appendChild(pLight);
                    
                    scene.appendChild(lamp);
                }
            }
        });
    </script>
</head>
<body>
    <a-scene kidnap-scene forest-generator fog="type: exponential; color: #020b16; density: 0.007" 
             renderer="antialias: true; logarithmicDepthBuffer: true; colorManagement: true; shadowMapType: pcfsoft">
        
        <a-assets>
            <a-mixin id="road-material" material="color: #111; roughness: 0.9; metalness: 0.1;"></a-mixin>
            <a-mixin id="grass-material" material="color: #051405; roughness: 1; metalness: 0;"></a-mixin>
            <a-mixin id="van-body" material="color: #000; roughness: 0.5; metalness: 0.2;"></a-mixin>
        </a-assets>

        <a-sky color="#020b16"></a-sky>
        <a-sphere position="-20 50 -100" radius="4" color="#E6E6E6" material="emissive: #E6E6E6; emissiveIntensity: 0.5"></a-sphere>
        
        <a-plane id="ground" mixin="grass-material" rotation="-90 0 0" width="2000" height="4000" position="0 -0.01 0" receive-shadow></a-plane>
        <a-plane id="road" mixin="road-material" rotation="-90 0 0" width="8" height="4000" position="0 0 0" receive-shadow></a-plane>
        <a-plane rotation="-90 0 0" width="0.1" height="4000" color="#FFD700" position="0 0.01 0" material="emissive: #FFD700; emissiveIntensity: 0.2"></a-plane>

        <!-- House Scene (Positioned far away, hidden initially) -->
        <a-entity id="house-scene" visible="false" position="1000 0 1000">
            <!-- Kidnapper in House (Standing) -->
            <a-entity id="kidnapper-house" visible="false" position="0 0 -1.8" rotation="0 0 0">
                <a-box width="0.7" height="1.0" depth="0.5" color="#111" position="0 1.0 0"></a-box> <!-- Torso -->
                <a-box width="0.2" height="1.0" depth="0.2" position="-0.2 0.5 0" color="#111"></a-box> <!-- Left Leg -->
                <a-box width="0.2" height="1.0" depth="0.2" position="0.2 0.5 0" color="#111"></a-box> <!-- Right Leg -->
                <a-sphere radius="0.25" position="0 1.75 0" color="#e0ac69"></a-sphere> <!-- Head -->
                <a-box width="0.1" height="0.8" depth="0.1" position="-0.4 1.1 0" color="#222"></a-box> <!-- Arms -->
                <a-box width="0.1" height="0.8" depth="0.1" position="0.4 1.1 0" color="#222"></a-box>
                <a-sphere radius="0.04" position="-0.1 1.8 0.22" color="red" material="emissive: red; emissiveIntensity: 2"></a-sphere>
                <a-sphere radius="0.04" position="0.1 1.8 0.22" color="red" material="emissive: red; emissiveIntensity: 2"></a-sphere>
            </a-entity>
            <!-- Room -->
            <a-box position="0 2.5 0" width="6" height="5" depth="6" material="color: #2b1b0d; side: back; roughness: 1; metalness: 0"></a-box>
            <a-plane rotation="-90 0 0" width="6" height="6" color="#3a2a1a" position="0 0.01 0"></a-plane> <!-- Floor -->
            
            <!-- Chair -->
            <a-box position="0 0.4 0" width="0.6" height="0.8" depth="0.6" color="#1a0d00"></a-box>
            <a-box position="0 1.2 -0.3" width="0.6" height="0.8" depth="0.1" color="#1a0d00"></a-box>
            
            <!-- Tied Hands (Ropes) -->
            <a-entity position="0 0.9 0.4">
                <a-cylinder radius="0.02" height="0.4" rotation="0 0 90" color="#8b4513" position="0 0 0"></a-cylinder> <!-- Rope wrap -->
                <a-cylinder radius="0.02" height="0.4" rotation="0 0 90" color="#8b4513" position="0 0.05 0"></a-cylinder> 
                <a-box width="0.3" height="0.1" depth="0.1" color="#e0ac69" position="0 0.02 0"></a-box> <!-- Generic hands -->
            </a-entity>

            <!-- Dim Light -->
            <a-light type="point" color="#ffccaa" intensity="0.5" position="0 4 0" distance="10" castShadow="false" light-flicker></a-light>
            <a-sphere radius="0.1" position="0 4.1 0" color="#ffccaa" material="emissive: #ffccaa; emissiveIntensity: 1"></a-sphere>
            
            <!-- Window with moon light -->
            <a-plane position="0 2.5 -2.9" width="1.5" height="2" material="color: #020b16; emissive: #6296c0; emissiveIntensity: 0.1"></a-plane>
            <a-box position="0 2.5 -2.95" width="1.6" height="2.1" depth="0.1" color="#111"></a-box>
        </a-entity>

        <a-entity id="rig" position="0 1.6 15" click-to-walk="speed: 0.12">
            <a-camera look-controls wasd-controls-enabled="false">
                <a-cursor color="#FFFFFF" opacity="0.6" scale="0.4 0.4 0.4"></a-cursor>
                <a-light type="spot" intensity="1" distance="15" angle="45" position="0 0 0"></a-light>
                <!-- Blackout plane for kidnapping effect -->
                <a-plane id="blackout" position="0 0 -0.1" width="1" height="1" 
                         material="color: #000; opacity: 0; transparent: true; shader: flat"
                         visible="true"></a-plane>
            </a-camera>
        </a-entity>

        <a-light type="ambient" color="#1a2b40" intensity="0.2"></a-light>
        <a-light type="directional" color="#6296c0" intensity="0.4" position="-1 5 1" cast-shadow></a-light>
    </a-scene>

    <div class="ui-overlay">
        <h1>Night VR Forest</h1>
        <p>Timer: <span id="timer-val">0</span>s</p>
        <p id="kidnap-text">Something feels wrong...</p>

        <div id="choice-menu-html" class="choice-container" style="display: none;">
            <button onclick="makeChoice(1)" class="choice-btn">1. Run</button>
            <button onclick="makeChoice(2)" class="choice-btn">2. Walk Normally</button>
            <button onclick="makeChoice(3)" class="choice-btn">3. Pick up a Weapon</button>
        </div>
    </div>

    <div id="dead-overlay" class="fullscreen-overlay">
        <div class="death-content">
            <h1 class="death-title">DEAD</h1>
            <p id="death-explanation"></p>
            <button onclick="location.reload()" class="retry-btn">RETRY</button>
        </div>
    </div>
</body>
</html>
